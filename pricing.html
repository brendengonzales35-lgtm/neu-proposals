<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Price Book</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo-box">NEU</div>
      <div>
        <h1>NEU Electrical Solutions</h1>
        <p>Price Book</p>
      </div>
    </div>
    <nav>
      <a href="index.html">Proposal</a>
      <a href="pricing.html" class="active">Price Book</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="section-heading">
        <div>
          <h2>Saved Pricing</h2>
          <p class="hint">Add, edit, or delete items. Changes save automatically in this browser.</p>
        </div>
        <button id="addPriceBtn">+ Add Price Item</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Category</th>
              <th>Internal Cost</th>
              <th>Selling Price</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="priceItems"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/pricing.js"></script>
</body>
</html>
